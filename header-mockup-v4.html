<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrisNoir — Header Mockup v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #ecdcc3;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       HERO — FULL BRAND IMAGE VISIBLE
       ═══════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    /* Brand image - fully visible */
    .hero-brand {
      width: 100%;
      max-width: 500px;
      height: auto;
      margin-top: 8vh;
      filter: drop-shadow(0 0 40px rgba(75, 42, 107, 0.3));
      animation: brandReveal 1.5s ease-out;
      z-index: 2;
    }

    @keyframes brandReveal {
      0% { 
        opacity: 0; 
        transform: scale(0.97);
      }
      100% { 
        opacity: 1; 
        transform: scale(1);
      }
    }

    /* Ambient background glow */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at center 30%, rgba(75, 42, 107, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at center 60%, rgba(201, 168, 106, 0.05) 0%, transparent 40%);
      z-index: 0;
    }

    /* Subtle vignette */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      padding: 2rem;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 4vh;
    }

    /* ═══════════════════════════════════════════
       TAGLINES
       ═══════════════════════════════════════════ */
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      color: #c9a86a;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
      text-shadow: 
        0 0 40px rgba(201, 168, 106, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.8);
      animation: fadeInUp 1.2s ease-out 0.8s both;
    }

    /* Elegant gold divider */
    .hero-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a86a, transparent);
      margin: 0 auto 1rem;
      box-shadow: 0 0 12px rgba(201, 168, 106, 0.4);
      animation: dividerGlow 1.5s ease-out 1.1s both;
    }

    @keyframes dividerGlow {
      0% { 
        opacity: 0; 
        width: 0;
      }
      100% { 
        opacity: 1; 
        width: 80px;
      }
    }

    /* Subtitle */
    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      font-style: italic;
      color: #ecdcc3;
      letter-spacing: 0.1em;
      opacity: 0.9;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      animation: fadeInUp 1.2s ease-out 1.3s both;
    }

    /* ═══════════════════════════════════════════
       SCROLL INDICATOR
       ═══════════════════════════════════════════ */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 2s forwards;
      z-index: 3;
    }

    .scroll-hint span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      color: #c9a86a;
      opacity: 0.7;
    }

    .scroll-arrow {
      width: 1px;
      height: 25px;
      background: linear-gradient(180deg, #c9a86a, transparent);
      animation: scrollPulse 2s ease-in-out 2.5s infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(15px);
      }
      to { 
        opacity: 1; 
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════
       PREVIEW NOTE
       ═══════════════════════════════════════════ */
    .preview-note {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #c9a86a;
      color: #0a0a0c;
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="preview-note">Mockup v4 — Full Logo</div>

  <section class="hero">
    
    <!-- Full brand logo visible -->
    <img 
      src="assets/irisnoir-brand-concept.png" 
      alt="IrisNoir — Purple iris with gold dust on black silk" 
      class="hero-brand"
    >
    
    <div class="hero-content">
      
      <h1 class="hero-title">Enter the Iris.</h1>
      
      <div class="hero-divider"></div>
      
      <p class="hero-subtitle">Venture softly. Discover boldly.</p>
      
    </div>

    <div class="scroll-hint">
      <span>explore</span>
      <div class="scroll-arrow"></div>
    </div>

  </section>

</body>
</html>
