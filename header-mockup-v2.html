<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrisNoir — Header Mockup v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #ecdcc3;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       HERO SECTION — NOIR EDITION
       ═══════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    /* Deep noir gradient overlay */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at center top, rgba(75, 42, 107, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at center, rgba(201, 168, 106, 0.03) 0%, transparent 40%),
        linear-gradient(180deg, #000 0%, #0a0a0c 50%, #000 100%);
      z-index: 0;
    }

    /* Subtle vignette */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 2rem;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ═══════════════════════════════════════════
       BRAND LOGO — PROMINENT
       ═══════════════════════════════════════════ */
    .hero-logo {
      width: 320px;
      max-width: 80vw;
      height: auto;
      margin-bottom: 3rem;
      filter: drop-shadow(0 0 60px rgba(75, 42, 107, 0.4))
              drop-shadow(0 0 30px rgba(201, 168, 106, 0.2));
      animation: logoReveal 2s ease-out;
    }

    @keyframes logoReveal {
      0% { 
        opacity: 0; 
        transform: scale(0.95);
        filter: drop-shadow(0 0 0px rgba(75, 42, 107, 0))
                drop-shadow(0 0 0px rgba(201, 168, 106, 0));
      }
      100% { 
        opacity: 1; 
        transform: scale(1);
        filter: drop-shadow(0 0 60px rgba(75, 42, 107, 0.4))
                drop-shadow(0 0 30px rgba(201, 168, 106, 0.2));
      }
    }

    /* ═══════════════════════════════════════════
       TAGLINES
       ═══════════════════════════════════════════ */
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      font-weight: 400;
      color: #c9a86a;
      letter-spacing: 0.12em;
      margin-bottom: 1.25rem;
      text-shadow: 
        0 0 40px rgba(201, 168, 106, 0.3),
        0 2px 4px rgba(0, 0, 0, 0.8);
      animation: fadeInUp 1.2s ease-out 0.5s both;
    }

    /* Elegant gold divider */
    .hero-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a86a, transparent);
      margin: 0 auto 1.25rem;
      box-shadow: 0 0 20px rgba(201, 168, 106, 0.4);
      animation: dividerGlow 1.5s ease-out 0.8s both;
    }

    @keyframes dividerGlow {
      0% { 
        opacity: 0; 
        width: 0;
        box-shadow: 0 0 0px rgba(201, 168, 106, 0);
      }
      100% { 
        opacity: 1; 
        width: 80px;
        box-shadow: 0 0 20px rgba(201, 168, 106, 0.4);
      }
    }

    /* Subtitle */
    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.8vw, 1.5rem);
      font-weight: 300;
      font-style: italic;
      color: #ecdcc3;
      letter-spacing: 0.08em;
      opacity: 0.85;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
      animation: fadeInUp 1.2s ease-out 1s both;
    }

    /* ═══════════════════════════════════════════
       SCROLL INDICATOR
       ═══════════════════════════════════════════ */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 2s forwards;
      z-index: 3;
    }

    .scroll-hint span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: lowercase;
      color: #c9a86a;
      opacity: 0.7;
    }

    .scroll-arrow {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, #c9a86a, transparent);
      position: relative;
      animation: scrollPulse 2s ease-in-out 2.5s infinite;
    }

    .scroll-arrow::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-right: 1px solid #c9a86a;
      border-bottom: 1px solid #c9a86a;
      transform: translateX(-50%) rotate(45deg);
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.5; transform: scaleY(1); }
      50% { opacity: 0.3; transform: scaleY(1.1); }
    }

    /* ═══════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(25px);
      }
      to { 
        opacity: 1; 
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════
       AMBIENT GLOW (optional subtle effect)
       ═══════════════════════════════════════════ */
    .ambient-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(75, 42, 107, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      z-index: 0;
      animation: ambientPulse 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
      50% { opacity: 0.4; transform: translate(-50%, -60%) scale(1.1); }
    }

    /* ═══════════════════════════════════════════
       PREVIEW NOTE
       ═══════════════════════════════════════════ */
    .preview-note {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #c9a86a;
      color: #0a0a0c;
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="preview-note">Mockup v2 — Noir</div>

  <section class="hero">
    
    <div class="ambient-glow"></div>
    
    <div class="hero-content">
      
      <!-- Brand Logo — Prominent -->
      <img 
        src="assets/irisnoir-brand-concept.png" 
        alt="IrisNoir — Purple iris with gold accents on black silk" 
        class="hero-logo"
      >
      
      <h1 class="hero-title">Enter the Iris.</h1>
      
      <div class="hero-divider"></div>
      
      <p class="hero-subtitle">Venture softly. Discover boldly.</p>
      
    </div>

    <div class="scroll-hint">
      <span>explore</span>
      <div class="scroll-arrow"></div>
    </div>

  </section>

</body>
</html>
