<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IrisNoir — Header Mockup v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #ecdcc3;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       HERO — FULL BRAND IMAGE BACKGROUND
       ═══════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: 
        url('assets/irisnoir-brand-concept.png') center center / cover no-repeat;
    }

    /* Noir overlay for text legibility */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(180deg, 
          rgba(0,0,0,0.3) 0%, 
          rgba(0,0,0,0.1) 30%,
          rgba(0,0,0,0.1) 50%,
          rgba(0,0,0,0.4) 75%,
          rgba(0,0,0,0.7) 100%
        );
      z-index: 1;
    }

    /* Subtle vignette */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      padding: 2rem;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 15vh; /* Push text below the iris flower */
    }

    /* ═══════════════════════════════════════════
       TAGLINES
       ═══════════════════════════════════════════ */
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 400;
      color: #c9a86a;
      letter-spacing: 0.12em;
      margin-bottom: 1.25rem;
      text-shadow: 
        0 0 60px rgba(0, 0, 0, 0.9),
        0 0 30px rgba(0, 0, 0, 0.8),
        0 4px 8px rgba(0, 0, 0, 0.9);
      animation: fadeInUp 1.2s ease-out 0.5s both;
    }

    /* Elegant gold divider */
    .hero-divider {
      width: 100px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a86a, transparent);
      margin: 0 auto 1.25rem;
      box-shadow: 0 0 15px rgba(201, 168, 106, 0.5);
      animation: dividerGlow 1.5s ease-out 0.8s both;
    }

    @keyframes dividerGlow {
      0% { 
        opacity: 0; 
        width: 0;
      }
      100% { 
        opacity: 1; 
        width: 100px;
      }
    }

    /* Subtitle */
    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
      font-style: italic;
      color: #ecdcc3;
      letter-spacing: 0.1em;
      text-shadow: 
        0 0 40px rgba(0, 0, 0, 0.9),
        0 2px 6px rgba(0, 0, 0, 0.9);
      animation: fadeInUp 1.2s ease-out 1s both;
    }

    /* ═══════════════════════════════════════════
       SCROLL INDICATOR
       ═══════════════════════════════════════════ */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 2s forwards;
      z-index: 3;
    }

    .scroll-hint span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      color: #c9a86a;
      opacity: 0.8;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    .scroll-arrow {
      width: 1px;
      height: 30px;
      background: linear-gradient(180deg, #c9a86a, transparent);
      animation: scrollPulse 2s ease-in-out 2.5s infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.3; }
    }

    /* ═══════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(20px);
      }
      to { 
        opacity: 1; 
        transform: translateY(0);
      }
    }

    /* ═══════════════════════════════════════════
       PREVIEW NOTE
       ═══════════════════════════════════════════ */
    .preview-note {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: #c9a86a;
      color: #0a0a0c;
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="preview-note">Mockup v3 — Full Background</div>

  <section class="hero">
    
    <div class="hero-content">
      
      <h1 class="hero-title">Enter the Iris.</h1>
      
      <div class="hero-divider"></div>
      
      <p class="hero-subtitle">Venture softly. Discover boldly.</p>
      
    </div>

    <div class="scroll-hint">
      <span>explore</span>
      <div class="scroll-arrow"></div>
    </div>

  </section>

</body>
</html>
